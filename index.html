<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Online Receipt System</title>
<style>
body {
  font-family: Arial;
  background: linear-gradient(270deg, #a0c4ff, #cdb4db, #ffc8dd, #fff1a8, #ffd6a5);
  min-height: 100vh;
}
.container {
  background: white;
  padding: 20px;
  width: 360px;
  margin: 30px auto;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
}
input, button {
  width: 90%;
  padding: 10px;
  margin: 5px 0;
}
img { max-width: 100%; margin-top: 10px; border-radius: 10px; }
</style>
</head>
<body>

<div class="container">
  <h3>Receipt Submission</h3>
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="totalAmount" placeholder="Total Amount">
  <input type="date" id="date">
  <input type="file" id="image" accept="image/*">
  <button onclick="submitData()">Submit</button>
  <img id="preview">
</div>

<script>
let imageBase64 = "";
const preview = document.getElementById("preview");
const imageInput = document.getElementById("image");

// Convert uploaded image to Base64
imageInput.addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      imageBase64 = e.target.result;
      preview.src = imageBase64;
      console.log("Image loaded as Base64");
    };
    reader.readAsDataURL(file);
  }
});

// Google Apps Script Web App URL (replace with your deployed URL)
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzPHD-XIus_tf9DHSqnfDoNBEyoRtAQvAruqtZDuii2Xj-dMWFumGdsHNAlVI60Oyu/exec";

async function submitData() {
  console.log("submitData called");

  const data = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    totalAmount: document.getElementById("totalAmount").value.trim(),
    date: document.getElementById("date").value,
    image: imageBase64
  };

  console.log("Data to submit:", data);

  if (!data.name || !data.email || !data.totalAmount || !data.date || !data.image) {
    alert("Please complete all fields including an image");
    return;
  }

  try {
    const res = await fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await res.text();
    console.log("Response from Apps Script:", result);

    if (result.includes("Success")) {
      alert("Submitted successfully!");
      // Reset form
      document.getElementById("name").value = "";
      document.getElementById("email").value = "";
      document.getElementById("totalAmount").value = "";
      document.getElementById("date").value = "";
      preview.src = "";
      imageBase64 = "";
    } else {
      alert("Submission failed: " + result);
    }
  } catch (err) {
    console.error("Error submitting:", err);
    alert("Failed to submit. Check console for details.");
  }
}
</script>

</body>
</html>
